name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Lint ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          working-directory: backend

      - name: Lint Backend
        run: |
          cd backend
          npm ci
          npm run lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint Worker
        run: |
          pip install flake8
          cd worker
          flake8 worker.py --max-line-length=120 --ignore=E501

  # ── Build & Push Docker Images ──
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: ai-task-backend
          - service: frontend
            context: ./frontend
            image: ai-task-frontend
          - service: worker
            context: ./worker
            image: ai-task-worker

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Update Infra Repository ──
  update-infra:
    name: Update Infra Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ai-task-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Update Image Tags
        run: |
          cd infra-repo
          # Update backend image tag
          sed -i "s|image: .*/ai-task-backend:.*|image: ${{ env.DOCKER_USERNAME }}/ai-task-backend:${{ env.IMAGE_TAG }}|g" k8s/backend.yaml
          # Update frontend image tag
          sed -i "s|image: .*/ai-task-frontend:.*|image: ${{ env.DOCKER_USERNAME }}/ai-task-frontend:${{ env.IMAGE_TAG }}|g" k8s/frontend.yaml
          # Update worker image tag
          sed -i "s|image: .*/ai-task-worker:.*|image: ${{ env.DOCKER_USERNAME }}/ai-task-worker:${{ env.IMAGE_TAG }}|g" k8s/worker.yaml

      - name: Commit & Push
        run: |
          cd infra-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ env.IMAGE_TAG }}"
          git push
